  <g id="takeaway"><text fill="#173B6D" font-weight="700" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" x="96" y="540">The thesis question is not how to sort,</text><text fill="#173B6D" font-weight="700" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" x="96" y="582">but which sorter to trust for this array.</text></g>
