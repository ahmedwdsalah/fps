<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF" />
  <g id="header"><text fill="#172033" font-weight="700" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="46" x="56" y="64">The algorithms are different enough</text><text fill="#172033" font-weight="700" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="46" x="56" y="116">to make selection useful</text><rect x="56" y="128" width="180" height="5" fill="#0F766E" /></g>
  <g id="portfolio">
    <path fill="#F6F8FB" stroke="#D8DEE8" d="M92,190 H416 A8,8 0 0 1 424,198 V482 A8,8 0 0 1 416,490 H92 A8,8 0 0 1 84,482 V198 A8,8 0 0 1 92,190 Z" /><text x="120" y="255" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="38" font-weight="700" fill="#173B6D">introsort</text><text fill="#172033" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" x="120" y="322">hybrid quicksort path</text><text fill="#172033" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" x="120" y="366">strong average behavior</text><path fill="#F6F8FB" stroke="#D8DEE8" d="M478,190 H802 A8,8 0 0 1 810,198 V482 A8,8 0 0 1 802,490 H478 A8,8 0 0 1 470,482 V198 A8,8 0 0 1 478,190 Z" /><text x="506" y="255" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="38" font-weight="700" fill="#173B6D">heapsort</text><text fill="#172033" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" x="506" y="322">stable worst-case bound</text><text fill="#172033" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" x="506" y="366">often the SBS baseline</text><path fill="#F6F8FB" stroke="#0F766E" stroke-width="2" d="M864,190 H1188 A8,8 0 0 1 1196,198 V482 A8,8 0 0 1 1188,490 H864 A8,8 0 0 1 856,482 V198 A8,8 0 0 1 864,190 Z" /><text x="892" y="255" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="38" font-weight="700" fill="#0F766E">timsort</text><text fill="#172033" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" x="892" y="322">uses existing runs</text><text fill="#172033" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" x="892" y="366">structurally visible</text></g>
  <g id="takeaway"><text x="84" y="590" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="34" font-weight="700" fill="#172033">The portfolio is small enough to defend and different enough to learn.</text></g>
