  <g id="separation"><path fill="#FFFFFF" stroke="#D99A20" stroke-width="2" d="M708,210 H1122 A8,8 0 0 1 1130,218 V517 A8,8 0 0 1 1122,525 H708 A8,8 0 0 1 700,517 V218 A8,8 0 0 1 708,210 Z" /><text x="734" y="270" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="34" font-weight="700" fill="#D99A20">Separate from F1 routing</text><text fill="#172033" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" x="734" y="340">v5 is the general thesis model.</text><text fill="#172033" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" x="734" y="388">F1 channel models are a</text><text fill="#172033" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" x="734" y="436">specialized experiment.</text></g>
