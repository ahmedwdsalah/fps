<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF" />
  <g id="header"><text fill="#172033" font-weight="700" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="46" x="56" y="64">The remaining errors show where</text><text fill="#172033" font-weight="700" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="46" x="56" y="116">the features stop seeing</text><rect x="56" y="128" width="180" height="5" fill="#D99A20" /></g>
  <g id="limit"><text x="110" y="245" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="38" font-weight="700" fill="#173B6D">Clear boundary</text><text x="110" y="305" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="32" fill="#172033">timsort vs the rest</text><line x1="110" y1="360" x2="1110" y2="360" stroke="#D8DEE8" stroke-width="3" /><text x="720" y="245" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="38" font-weight="700" fill="#D99A20">Hard boundary</text><text x="720" y="305" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="32" fill="#172033">introsort vs heapsort</text></g>
  <g id="f1"><path fill="#F6F8FB" stroke="#D8DEE8" d="M158,455 H1122 A8,8 0 0 1 1130,463 V572 A8,8 0 0 1 1122,580 H158 A8,8 0 0 1 150,572 V463 A8,8 0 0 1 158,455 Z" /><text fill="#172033" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="26" x="190" y="497">F1 channel routing is a separate specialization:</text><text fill="#172033" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="26" x="190" y="531">useful to mention, not the main thesis model.</text><text x="190" y="560" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" fill="#586174">This keeps the three-label v5 selector and the F1-specific five-label experiment separated.</text></g>
  <g id="footer"><text x="1180" y="680" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#7A8495">20</text></g>
</svg>