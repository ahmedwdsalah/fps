    <path fill="#F6F8FB" stroke="#D8DEE8" d="M98,170 H592 A8,8 0 0 1 600,178 V322 A8,8 0 0 1 592,330 H98 A8,8 0 0 1 90,322 V178 A8,8 0 0 1 98,170 Z" /><text x="126" y="225" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="34" font-weight="700" fill="#173B6D">Size</text><text x="126" y="278" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="26" fill="#172033">length_norm</text>
