<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <g id="header"><text x="56" y="78" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="52" font-weight="700" fill="#172033">The algorithms are different enough to make selection useful</text><rect x="56" y="104" width="180" height="5" fill="#0F766E"/></g>
  <g id="portfolio">
    <rect x="84" y="190" width="340" height="300" rx="8" fill="#F6F8FB" stroke="#D8DEE8"/><text x="120" y="255" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="38" font-weight="700" fill="#173B6D">introsort</text><text x="120" y="322" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" fill="#172033"><tspan x="120" dy="0">hybrid quicksort path</tspan><tspan x="120" dy="44">strong average behavior</tspan></text>
    <rect x="470" y="190" width="340" height="300" rx="8" fill="#F6F8FB" stroke="#D8DEE8"/><text x="506" y="255" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="38" font-weight="700" fill="#173B6D">heapsort</text><text x="506" y="322" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" fill="#172033"><tspan x="506" dy="0">stable worst-case bound</tspan><tspan x="506" dy="44">often the SBS baseline</tspan></text>
    <rect x="856" y="190" width="340" height="300" rx="8" fill="#F6F8FB" stroke="#0F766E" stroke-width="2"/><text x="892" y="255" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="38" font-weight="700" fill="#0F766E">timsort</text><text x="892" y="322" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" fill="#172033"><tspan x="892" dy="0">uses existing runs</tspan><tspan x="892" dy="44">structurally visible</tspan></text>
  </g>
  <g id="takeaway"><text x="84" y="590" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="34" font-weight="700" fill="#172033">The portfolio is small enough to defend and different enough to learn.</text></g>
  <g id="footer"><text x="1180" y="680" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#7A8495">08</text></g>
</svg>
