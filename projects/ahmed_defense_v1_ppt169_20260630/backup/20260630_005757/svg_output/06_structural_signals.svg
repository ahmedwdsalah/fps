  <g id="takeaway"><text x="836" y="198" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="38" font-weight="700" fill="#173B6D">The model does not see the raw sequence.</text><text x="836" y="268" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="32" fill="#172033"><tspan x="836" dy="0">It sees compact structure:</tspan><tspan x="836" dy="54">size</tspan><tspan x="836" dy="46">ordering</tspan><tspan x="836" dy="46">repetition</tspan><tspan x="836" dy="46">distribution</tspan></text></g>
