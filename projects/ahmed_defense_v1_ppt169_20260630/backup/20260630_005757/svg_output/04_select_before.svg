<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <g id="header"><text x="56" y="78" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="52" font-weight="700" fill="#172033">This thesis selects before sorting begins</text><rect x="56" y="104" width="180" height="5" fill="#0F766E"/></g>
  <g id="method">
    <rect x="110" y="210" width="250" height="150" rx="8" fill="#F6F8FB" stroke="#D8DEE8"/><text x="142" y="278" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="34" fill="#172033">Array</text><text x="142" y="322" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="22" fill="#586174">not sorted yet</text>
    <line x1="386" y1="285" x2="520" y2="285" stroke="#173B6D" stroke-width="4"/><polygon points="520,285 500,273 500,297" fill="#173B6D"/>
    <rect x="548" y="190" width="280" height="190" rx="8" fill="#FFFFFF" stroke="#173B6D" stroke-width="2"/><use data-icon="tabler-outline/filter" x="580" y="232" width="46" height="46" fill="#173B6D" stroke-width="2"/><text x="648" y="265" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="32" fill="#172033">16 features</text><text x="580" y="324" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="22" fill="#586174">cheap structural summary</text>
    <line x1="854" y1="285" x2="988" y2="285" stroke="#173B6D" stroke-width="4"/><polygon points="988,285 968,273 968,297" fill="#173B6D"/>
    <rect x="1016" y="210" width="190" height="150" rx="8" fill="#F6F8FB" stroke="#0F766E" stroke-width="2"/><text x="1048" y="278" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="34" fill="#172033">one pick</text><text x="1048" y="322" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="22" fill="#586174">then execute</text>
  </g>
  <g id="takeaway"><text x="110" y="560" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="38" font-weight="700" fill="#173B6D">The selector pays a small feature cost to avoid a larger runtime mistake.</text></g>
