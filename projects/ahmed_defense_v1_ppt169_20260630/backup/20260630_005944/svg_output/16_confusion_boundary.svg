  <g id="interpretation"><text x="700" y="205" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="72" font-weight="700" fill="#0F766E">94.5%</text><text x="700" y="252" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" fill="#172033">timsort recall</text><text x="700" y="350" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="32" fill="#172033"><tspan x="700" dy="0">The weak boundary is</tspan><tspan x="700" dy="50">between introsort and heapsort,</tspan><tspan x="700" dy="50">where structural features are close.</tspan></text></g>
