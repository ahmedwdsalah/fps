  <g id="header"><text x="56" y="58" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="44" font-weight="700" fill="#172033"><tspan x="56" dy="0">Timsort is structurally visible;</tspan><tspan x="56" dy="50">introsort vs heapsort is not</tspan></text><rect x="56" y="122" width="180" height="5" fill="#D99A20"/></g>
