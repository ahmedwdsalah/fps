<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <g id="header"><text x="56" y="78" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="52" font-weight="700" fill="#172033">The main model is the general v5 selector</text><rect x="56" y="104" width="180" height="5" fill="#0F766E"/></g>
  <g id="model-card"><rect x="110" y="170" width="500" height="395" rx="8" fill="#F6F8FB" stroke="#D8DEE8"/><use data-icon="tabler-outline/brain" x="146" y="208" width="50" height="50" fill="#173B6D" stroke-width="2"/><text x="216" y="248" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="38" font-weight="700" fill="#173B6D">XGBoost v5</text><text x="146" y="330" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" fill="#172033"><tspan x="146" dy="0">16 structural features</tspan><tspan x="146" dy="54">3 algorithm labels</tspan><tspan x="146" dy="54">70 / 15 / 15 split</tspan><tspan x="146" dy="54">balanced training strategy</tspan></text></g>
  <g id="separation"><rect x="700" y="210" width="430" height="315" rx="8" fill="#FFFFFF" stroke="#D99A20" stroke-width="2"/><text x="734" y="270" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="34" font-weight="700" fill="#D99A20">Separate from F1 routing</text><text x="734" y="340" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" fill="#172033"><tspan x="734" dy="0">v5 is the general thesis model.</tspan><tspan x="734" dy="48">F1 channel models are a</tspan><tspan x="734" dy="48">specialized experiment.</tspan></text></g>
  <g id="footer"><text x="1180" y="680" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#7A8495">12</text></g>
</svg>
