<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF" />
  <rect x="0" y="0" width="1280" height="70" fill="#191919" /><rect x="0" y="0" width="8" height="70" fill="#D97757" />
  <text x="40" y="44" font-family="'Styrene A', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">Strict checks changed what I was willing to claim</text>
  <rect x="0" y="70" width="1280" height="50" fill="#F8FAFC" /><rect x="40" y="86" width="4" height="18" fill="#D97757" />
  <text x="58" y="103" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#191919">Several experiments were useful because they reduced overclaiming.</text>
  <path fill="#F8FAFC" stroke="#E2E8F0" d="M88,155 H412 A8,8 0 0 1 420,163 V527 A8,8 0 0 1 412,535 H88 A8,8 0 0 1 80,527 V163 A8,8 0 0 1 88,155 Z" /><text x="110" y="215" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#191919">v6 source-aware</text><text x="110" y="275" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">Accuracy dropped to 71.2%.</text><text x="110" y="315" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">This made leakage checks</text><text x="110" y="355" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">part of the defense.</text>
  <path fill="#FFFFFF" stroke="#E2E8F0" d="M478,155 H802 A8,8 0 0 1 810,163 V527 A8,8 0 0 1 802,535 H478 A8,8 0 0 1 470,527 V163 A8,8 0 0 1 478,155 Z" /><text x="500" y="215" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#191919">v7 regret-aware</text><text x="500" y="275" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">Optimizing the wrong signal</text><text x="500" y="315" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">reduced gap closed to</text><text x="500" y="355" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">78.1%.</text>
  <path fill="#191919" d="M868,155 H1192 A8,8 0 0 1 1200,163 V527 A8,8 0 0 1 1192,535 H868 A8,8 0 0 1 860,527 V163 A8,8 0 0 1 868,155 Z" /><text x="890" y="215" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">v8 cascade</text><text x="890" y="275" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#FFFFFF">Stage 2 stayed weak</text><text x="890" y="315" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#FFFFFF">when intro and heap</text><text x="890" y="355" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#FFFFFF">were too close.</text>
  <text x="80" y="600" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#191919">So the final claim stays focused: v5 works well under the submitted evaluation, with known limits.</text>
  <line x1="40" y1="666" x2="1240" y2="666" stroke="#E2E8F0" /><text x="40" y="696" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748B">Rigor and lessons</text><text x="1240" y="696" text-anchor="end" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748B">20 / 22</text>
</svg>