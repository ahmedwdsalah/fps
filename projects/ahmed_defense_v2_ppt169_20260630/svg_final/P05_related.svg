<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF" />
  <rect x="0" y="0" width="1280" height="70" fill="#191919" /><rect x="0" y="0" width="8" height="70" fill="#D97757" />
  <text x="40" y="44" font-family="'Styrene A', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">What previous work gives us</text>
  <rect x="0" y="70" width="1280" height="50" fill="#F8FAFC" /><rect x="40" y="86" width="4" height="18" fill="#D97757" />
  <text x="58" y="103" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#191919">The idea is connected to algorithm selection, adaptive sorting, and learned performance prediction.</text>
  <path fill="#F8FAFC" stroke="#E2E8F0" d="M80,160 H408 A8,8 0 0 1 416,168 V532 A8,8 0 0 1 408,540 H80 A8,8 0 0 1 72,532 V168 A8,8 0 0 1 80,160 Z" />
  <text x="102" y="214" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#191919">Algorithm selection</text>
  <text x="102" y="276" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">Rice formalized choosing</text>
  <text x="102" y="310" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">a solver from problem</text>
  <text x="102" y="344" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">features.</text>
  <text x="102" y="442" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#191919">My use: sorting algorithm</text>
  <text x="102" y="474" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#191919">choice as a supervised task.</text>
  <path fill="#FFFFFF" stroke="#E2E8F0" d="M476,160 H804 A8,8 0 0 1 812,168 V532 A8,8 0 0 1 804,540 H476 A8,8 0 0 1 468,532 V168 A8,8 0 0 1 476,160 Z" />
  <text x="498" y="214" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#191919">Adaptive sorting</text>
  <text x="498" y="276" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">Timsort and related work</text>
  <text x="498" y="310" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">exploit runs and existing</text>
  <text x="498" y="344" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">order in data.</text>
  <text x="498" y="442" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#191919">My use: expose these signals</text>
  <text x="498" y="474" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#191919">as measurable features.</text>
  <path fill="#F8FAFC" stroke="#E2E8F0" d="M872,160 H1200 A8,8 0 0 1 1208,168 V532 A8,8 0 0 1 1200,540 H872 A8,8 0 0 1 864,532 V168 A8,8 0 0 1 872,160 Z" />
  <text x="894" y="214" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#191919">Performance models</text>
  <text x="894" y="276" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">ML can predict runtime</text>
  <text x="894" y="310" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">behavior when features are</text>
  <text x="894" y="344" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">cheap enough.</text>
  <text x="894" y="442" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#191919">My use: evaluate by regret,</text>
  <text x="894" y="474" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#191919">not only label accuracy.</text>
  <text x="72" y="575" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" fill="#191919">So the contribution is not a new sorter.</text>
  <text x="72" y="615" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" fill="#191919">It is a measured selector around existing sorters.</text>
  <line x1="40" y1="666" x2="1240" y2="666" stroke="#E2E8F0" /><text x="40" y="696" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748B">Related work inside task framing</text><text x="1240" y="696" text-anchor="end" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748B">05 / 22</text>
</svg>