  <text x="558" y="321" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#64748B">Five domains, measured labels, and cheap structural summaries</text>

  <circle cx="126" cy="394" r="22" fill="#D97757" /><text x="126" y="402" text-anchor="middle" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" font-weight="700" fill="#FFFFFF">3</text>
