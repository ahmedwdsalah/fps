<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="gapGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9A1C3E"/>
      <stop offset="1" stop-color="#F94E1F"/>
    </linearGradient>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#D97757"/>
    </marker>
    <marker id="arrowDark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#263445"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1600" height="27" fill="#9A1C3E"/>
  <rect x="0" y="27" width="1600" height="8" fill="#F94E1F"/>
  <rect x="0" y="866" width="1600" height="34" fill="#9A1C3E"/>

  <text x="74" y="94" font-family="Aptos Display, Arial, sans-serif" font-size="44" font-weight="700" fill="#191919">Why sorting selection matters</text>
  <text x="74" y="136" font-family="Aptos, Arial, sans-serif" font-size="22" fill="#263445">The thesis measures how much runtime gap remains between a fixed solver and the per-instance best solver.</text>
  <line x1="74" y1="164" x2="1526" y2="164" stroke="#D8E0EA" stroke-width="2"/>

  <g transform="translate(92,210)">
    <rect x="0" y="0" width="382" height="392" rx="7" fill="#F6F8FB" stroke="#D6DFEA" filter="url(#softShadow)"/>
    <text x="34" y="45" font-family="Aptos Display, Arial, sans-serif" font-size="28" font-weight="700" fill="#191919">Input instance</text>
    <text x="34" y="78" font-family="Aptos, Arial, sans-serif" font-size="18" fill="#586A86">same task, different structure</text>

    <g transform="translate(34,122)">
      <text x="0" y="0" font-family="Aptos, Arial, sans-serif" font-size="15" fill="#586A86">ordered runs</text>
      <line x1="0" y1="52" x2="280" y2="52" stroke="#D8E0EA"/>
      <rect x="0" y="38" width="24" height="14" fill="#DDE5EF"/>
      <rect x="34" y="34" width="24" height="18" fill="#DDE5EF"/>
      <rect x="68" y="30" width="24" height="22" fill="#DDE5EF"/>
      <rect x="112" y="12" width="24" height="40" fill="#D97757"/>
      <rect x="146" y="8" width="24" height="44" fill="#D97757"/>
      <rect x="180" y="4" width="24" height="48" fill="#D97757"/>
      <rect x="224" y="42" width="24" height="10" fill="#B91C1C"/>
      <rect x="258" y="42" width="24" height="10" fill="#B91C1C"/>
    </g>

    <g transform="translate(34,208)">
      <text x="0" y="0" font-family="Aptos, Arial, sans-serif" font-size="15" fill="#586A86">duplicate-heavy values</text>
      <line x1="0" y1="52" x2="280" y2="52" stroke="#D8E0EA"/>
      <rect x="0" y="24" width="24" height="28" fill="#8DA6C8"/>
      <rect x="34" y="24" width="24" height="28" fill="#8DA6C8"/>
      <rect x="68" y="24" width="24" height="28" fill="#8DA6C8"/>
      <rect x="112" y="24" width="24" height="28" fill="#8DA6C8"/>
      <rect x="156" y="14" width="24" height="38" fill="#9A1C3E"/>
      <rect x="190" y="14" width="24" height="38" fill="#9A1C3E"/>
      <rect x="224" y="40" width="24" height="12" fill="#DDE5EF"/>
      <rect x="258" y="40" width="24" height="12" fill="#DDE5EF"/>
    </g>

    <g transform="translate(34,295)">
      <text x="0" y="0" font-family="Aptos, Arial, sans-serif" font-size="15" fill="#586A86">local disorder</text>
      <path d="M0,46 L24,16 L48,42 L72,8 L96,36 L120,20 L144,48 L168,12 L192,30 L216,18 L240,43 L264,22 L288,38" fill="none" stroke="#263445" stroke-width="3"/>
    </g>
  </g>

  <g transform="translate(548,228)">
    <text x="0" y="-22" font-family="Aptos Display, Arial, sans-serif" font-size="25" font-weight="700" fill="#191919">Reference points used in the thesis</text>

    <rect x="0" y="24" width="275" height="166" rx="7" fill="#FFFFFF" stroke="#D6DFEA" filter="url(#softShadow)"/>
    <text x="138" y="77" text-anchor="middle" font-family="Aptos Display, Arial, sans-serif" font-size="44" font-weight="700" fill="#191919">SBS</text>
    <text x="138" y="113" text-anchor="middle" font-family="Aptos, Arial, sans-serif" font-size="20" fill="#586A86">Single Best Solver</text>
    <text x="138" y="151" text-anchor="middle" font-family="Aptos, Arial, sans-serif" font-size="18" fill="#263445">one fixed algorithm</text>

    <rect x="330" y="24" width="275" height="166" rx="7" fill="#191919" stroke="#191919" filter="url(#softShadow)"/>
    <text x="468" y="77" text-anchor="middle" font-family="Aptos Display, Arial, sans-serif" font-size="44" font-weight="700" fill="#F94E1F">VBS</text>
    <text x="468" y="113" text-anchor="middle" font-family="Aptos, Arial, sans-serif" font-size="20" fill="#FFFFFF">Virtual Best Solver</text>
    <text x="468" y="151" text-anchor="middle" font-family="Aptos, Arial, sans-serif" font-size="18" fill="#D8E0EA">best per instance</text>

    <line x1="275" y1="107" x2="330" y2="107" stroke="#D97757" stroke-width="4" marker-end="url(#arrowOrange)"/>

    <g transform="translate(0,246)">
      <text x="0" y="0" font-family="Aptos Display, Arial, sans-serif" font-size="25" font-weight="700" fill="#191919">Runtime objective</text>
      <rect x="0" y="30" width="605" height="144" rx="7" fill="#F6F8FB" stroke="#D6DFEA"/>
      <text x="36" y="82" font-family="Aptos, Arial, sans-serif" font-size="24" fill="#263445">gap closed</text>
      <rect x="170" y="62" width="360" height="28" rx="14" fill="#E6EBF2"/>
      <rect x="170" y="62" width="320" height="28" rx="14" fill="url(#gapGrad)"/>
      <line x1="170" y1="108" x2="170" y2="132" stroke="#586A86" stroke-width="2"/>
      <line x1="530" y1="108" x2="530" y2="132" stroke="#586A86" stroke-width="2"/>
      <text x="170" y="154" text-anchor="middle" font-family="Aptos, Arial, sans-serif" font-size="16" fill="#586A86">SBS</text>
      <text x="530" y="154" text-anchor="middle" font-family="Aptos, Arial, sans-serif" font-size="16" fill="#586A86">VBS</text>
      <text x="350" y="119" text-anchor="middle" font-family="Aptos Display, Arial, sans-serif" font-size="30" font-weight="700" fill="#9A1C3E">move toward VBS</text>
    </g>
  </g>

  <g transform="translate(1238,232)">
    <rect x="0" y="0" width="270" height="390" rx="7" fill="#FFFFFF" stroke="#D6DFEA" filter="url(#softShadow)"/>
    <text x="135" y="48" text-anchor="middle" font-family="Aptos Display, Arial, sans-serif" font-size="27" font-weight="700" fill="#191919">Selector</text>
    <text x="135" y="91" text-anchor="middle" font-family="Aptos, Arial, sans-serif" font-size="20" fill="#586A86">features only</text>
    <line x1="44" y1="124" x2="226" y2="124" stroke="#D8E0EA"/>
    <text x="135" y="176" text-anchor="middle" font-family="Aptos, Arial, sans-serif" font-size="21" font-weight="700" fill="#191919">choose before sorting</text>
    <text x="135" y="226" text-anchor="middle" font-family="Aptos, Arial, sans-serif" font-size="17" fill="#586A86">no portfolio timing</text>
    <text x="135" y="255" text-anchor="middle" font-family="Aptos, Arial, sans-serif" font-size="17" fill="#586A86">at prediction time</text>
    <rect x="44" y="300" width="182" height="50" rx="25" fill="#F94E1F"/>
    <text x="135" y="333" text-anchor="middle" font-family="Aptos, Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">low regret</text>
  </g>

  <line x1="474" y1="406" x2="548" y2="406" stroke="#263445" stroke-width="4" marker-end="url(#arrowDark)"/>
  <line x1="1153" y1="406" x2="1238" y2="406" stroke="#263445" stroke-width="4" marker-end="url(#arrowDark)"/>

  <text x="800" y="772" text-anchor="middle" font-family="Aptos Display, Arial, sans-serif" font-size="26" font-weight="700" fill="#191919">Accuracy is reported, but runtime regret decides whether a wrong label matters.</text>
  <text x="1532" y="891" text-anchor="end" font-family="Aptos, Arial, sans-serif" font-size="14" fill="#FFFFFF">4/24</text>
</svg>
