<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="760" viewBox="0 0 1800 760">
  <defs>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#c89116"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 18 9 L 0 18 z" fill="#c89116"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
    <style>
      .box { fill:#df982d; stroke:#6b4a13; stroke-width:3; rx:28; filter:url(#softShadow); }
      .boxText { font-family:"Times New Roman", Times, serif; fill:#ffffff; font-weight:700; font-size:33px; text-anchor:middle; dominant-baseline:middle; }
      .smallText { font-family:"Times New Roman", Times, serif; fill:#ffffff; font-weight:700; font-size:25px; text-anchor:middle; dominant-baseline:middle; }
      .mathText { font-family:"Times New Roman", Times, serif; fill:#222222; font-style:italic; font-size:29px; text-anchor:middle; }
      .arrow { fill:none; stroke:url(#arrowGrad); stroke-width:4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowHead); }
      .thinArrow { fill:none; stroke:url(#arrowGrad); stroke-width:4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowHead); }
      .arcGuide { fill:none; stroke:#d8dde6; stroke-width:2; stroke-dasharray:10 12; opacity:.75; }
    </style>
  </defs>

  <rect width="1800" height="760" fill="#ffffff"/>

  <!-- subtle arch guide -->
  <path class="arcGuide" d="M 172 392 C 420 120, 1375 120, 1628 392"/>

  <!-- Main arched ML pipeline -->
  <rect class="box" x="80" y="330" width="270" height="142" rx="28"/>
  <text class="boxText" x="215" y="380">Input</text>
  <text class="smallText" x="215" y="420">numeric array</text>

  <rect class="box" x="440" y="225" width="300" height="150" rx="28"/>
  <text class="boxText" x="590" y="270">Feature</text>
  <text class="boxText" x="590" y="309">extraction</text>
  <text class="smallText" x="590" y="346">16 structural features</text>

  <rect class="box" x="840" y="160" width="300" height="150" rx="28"/>
  <text class="boxText" x="990" y="205">Feature vector</text>
  <text class="smallText" x="990" y="246">x ∈ R^16</text>
  <text class="smallText" x="990" y="282">model input</text>

  <rect class="box" x="1240" y="225" width="300" height="150" rx="28"/>
  <text class="boxText" x="1390" y="270">XGBoost</text>
  <text class="boxText" x="1390" y="309">classifier</text>
  <text class="smallText" x="1390" y="346">boosted trees</text>

  <rect class="box" x="1450" y="500" width="270" height="142" rx="28"/>
  <text class="boxText" x="1585" y="548">Predicted</text>
  <text class="smallText" x="1585" y="588">fastest algorithm</text>

  <!-- Probability branch -->
  <rect class="box" x="1000" y="500" width="300" height="142" rx="28"/>
  <text class="boxText" x="1150" y="548">Class</text>
  <text class="boxText" x="1150" y="586">probabilities</text>
  <text class="smallText" x="1150" y="620">intro / heap / tim</text>

  <!-- Training label branch -->
  <rect class="box" x="470" y="500" width="330" height="142" rx="28"/>
  <text class="boxText" x="635" y="548">Runtime label</text>
  <text class="smallText" x="635" y="588">argmin measured time</text>

  <!-- arrows along arch -->
  <path class="arrow" d="M 350 398 C 390 380, 410 342, 440 316"/>
  <path class="arrow" d="M 740 288 C 775 257, 805 242, 840 235"/>
  <path class="arrow" d="M 1140 235 C 1175 242, 1205 257, 1240 288"/>
  <path class="arrow" d="M 1390 375 C 1392 425, 1374 472, 1300 536"/>
  <path class="arrow" d="M 1300 571 C 1355 571, 1395 571, 1450 571"/>

  <!-- training signal arrow -->
  <path class="thinArrow" d="M 635 500 C 670 436, 755 363, 840 286"/>

  <!-- small formula labels -->
  <text class="mathText" x="810" y="410">label(x) = argminₐ T(a, x)</text>
  <text class="mathText" x="1230" y="438">softprob output</text>
</svg>
