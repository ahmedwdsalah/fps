<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <path d="M0 0 H1280 V18 H0 Z" fill="#8F1D3A"/>
  <path d="M0 18 H1280 V28 H0 Z" fill="#F4511E"/>
  <text x="64" y="72" font-family="'Styrene A', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#191919">The selector still transfers across held-out domains</text>
  
  <text x="64" y="108" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#191919">Domain holdout is stricter than a random split because the test domain was unseen during training.</text>
  <image href="../images/F10_domain_holdout_gap_closed.png" x="70" y="145" width="760" height="455" preserveAspectRatio="xMidYMid meet"/>
  <rect x="880" y="178" width="300" height="155" rx="8" fill="#191919"/>
  <text x="1030" y="255" text-anchor="middle" font-family="'Styrene A', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="58" font-weight="700" fill="#D97757">79.7%</text>
  <text x="1030" y="295" text-anchor="middle" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#FFFFFF">weighted gap closed</text>
  <rect x="880" y="370" width="300" height="190" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="910" y="420" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#191919">Important caveat</text>
  <text x="910" y="462" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#64748B">F1 is the hardest held-out</text>
  <text x="910" y="494" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#64748B">domain, which motivates the</text>
  <text x="910" y="526" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#64748B">separate F1 specialization.</text>
  <line x1="40" y1="666" x2="1240" y2="666" stroke="#E2E8F0"/><text x="1240" y="696" text-anchor="end" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748B">19 / 22</text>
  <path d="M0 692 H1280 V720 H0 Z" fill="#8F1D3A"/>
</svg>
