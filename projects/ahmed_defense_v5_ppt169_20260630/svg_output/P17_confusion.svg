<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <path d="M0 0 H1280 V18 H0 Z" fill="#8F1D3A"/>
  <path d="M0 18 H1280 V28 H0 Z" fill="#F4511E"/>
  <text x="64" y="72" font-family="'Styrene A', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#191919">The hardest boundary is between close algorithms</text>
  
  <text x="64" y="108" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#191919">The confusion matrix shows strong timsort behavior and weaker separation where runtimes are close.</text>
  <image href="../images/F5_confusion_matrix.png" x="80" y="150" width="570" height="465" preserveAspectRatio="xMidYMid meet"/>
  <rect x="720" y="170" width="440" height="120" rx="8" fill="#191919"/><text x="750" y="220" font-family="'Styrene A', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#D97757">94.5%</text><text x="750" y="260" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#FFFFFF">timsort recall</text>
  <rect x="720" y="330" width="440" height="185" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/><text x="750" y="382" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#191919">Interpretation</text><text x="750" y="430" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">Timsort is easier when order signals are present.</text><text x="750" y="470" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">Intro and heap can be much closer.</text>
  <text x="720" y="575" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#191919">This is a limitation, but regret tells us</text>
  <text x="720" y="610" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#191919">many of these errors are low cost.</text>
  <line x1="40" y1="666" x2="1240" y2="666" stroke="#E2E8F0"/><text x="1240" y="696" text-anchor="end" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748B">17 / 22</text>
  <path d="M0 692 H1280 V720 H0 Z" fill="#8F1D3A"/>
</svg>
