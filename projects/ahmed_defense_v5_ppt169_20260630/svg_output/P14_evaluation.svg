<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <path d="M0 0 H1280 V18 H0 Z" fill="#8F1D3A"/>
  <path d="M0 18 H1280 V28 H0 Z" fill="#F4511E"/>
  <text x="64" y="72" font-family="'Styrene A', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#191919">Evaluation asks how close we are to the oracle</text>
  
  <text x="64" y="108" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#191919">Accuracy says whether the class is right; regret says whether the runtime consequence matters.</text>
  <rect x="80" y="155" width="350" height="270" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/><text x="110" y="215" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#191919">SBS</text><text x="110" y="270" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">single best algorithm</text><text x="110" y="306" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">over the test set</text>
  <rect x="465" y="155" width="350" height="270" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/><text x="495" y="215" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#191919">VBS</text><text x="495" y="270" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">fastest measured algorithm</text><text x="495" y="306" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">for each input</text>
  <rect x="850" y="155" width="350" height="270" rx="8" fill="#191919"/><text x="880" y="215" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">Model</text><text x="880" y="270" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#FFFFFF">choose before sorting</text><text x="880" y="306" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#FFFFFF">using features only</text>
  <image href="../images/formula_regret.png" x="120" y="470" width="450" height="95" preserveAspectRatio="xMidYMid meet"/>
  <image href="../images/formula_gap_closed.png" x="690" y="470" width="460" height="95" preserveAspectRatio="xMidYMid meet"/>
  <text x="120" y="610" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#64748B">These formulas make the runtime result defensible, not just the classifier result.</text>
  <line x1="40" y1="666" x2="1240" y2="666" stroke="#E2E8F0"/><text x="1240" y="696" text-anchor="end" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748B">14 / 22</text>
  <path d="M0 692 H1280 V720 H0 Z" fill="#8F1D3A"/>
</svg>
