<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <path d="M0 0 H1280 V18 H0 Z" fill="#8F1D3A"/>
  <path d="M0 18 H1280 V28 H0 Z" fill="#F4511E"/>
  <text x="64" y="72" font-family="'Styrene A', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#191919">Strict checks changed what I was willing to claim</text>
  
  <text x="64" y="108" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#191919">Several experiments were useful because they reduced overclaiming.</text>
  <rect x="80" y="155" width="340" height="380" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/><text x="110" y="215" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#191919">v6 source-aware</text><text x="110" y="275" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">Accuracy dropped to 71.2%.</text><text x="110" y="315" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">This made leakage checks</text><text x="110" y="355" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">part of the defense.</text>
  <rect x="470" y="155" width="340" height="380" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/><text x="500" y="215" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#191919">v7 regret-aware</text><text x="500" y="275" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">Optimizing the wrong signal</text><text x="500" y="315" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">reduced gap closed to</text><text x="500" y="355" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">78.1%.</text>
  <rect x="860" y="155" width="340" height="380" rx="8" fill="#191919"/><text x="890" y="215" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">v8 cascade</text><text x="890" y="275" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#FFFFFF">Stage 2 stayed weak</text><text x="890" y="315" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#FFFFFF">when intro and heap</text><text x="890" y="355" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#FFFFFF">were too close.</text>
  <text x="80" y="600" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#191919">So the final claim stays focused: v5 works well under the submitted evaluation, with known limits.</text>
  <line x1="40" y1="666" x2="1240" y2="666" stroke="#E2E8F0"/><text x="1240" y="696" text-anchor="end" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748B">20 / 22</text>
  <path d="M0 692 H1280 V720 H0 Z" fill="#8F1D3A"/>
</svg>
