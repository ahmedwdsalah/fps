<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <path d="M0 0 H1280 V18 H0 Z" fill="#8F1D3A"/>
  <path d="M0 18 H1280 V28 H0 Z" fill="#F4511E"/>
  <text x="64" y="72" font-family="'Styrene A', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#191919">The model uses structural signals, not magic</text>
  
  <text x="64" y="108" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#191919">Feature importance links the learned choices back to the array properties we extracted.</text>
  <image href="../images/F4_feature_importance.png" x="70" y="145" width="760" height="445" preserveAspectRatio="xMidYMid meet"/>
  <rect x="880" y="170" width="300" height="110" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/><text x="910" y="220" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#191919">Order signals</text><text x="910" y="252" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#64748B">runs, inversions, monotonicity</text>
  <rect x="880" y="315" width="300" height="110" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/><text x="910" y="365" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#191919">Value distribution</text><text x="910" y="397" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#64748B">duplicates, range, entropy</text>
  <rect x="880" y="460" width="300" height="110" rx="8" fill="#191919"/><text x="910" y="510" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">Size context</text><text x="910" y="542" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#FFFFFF">array length and scale</text>
  <line x1="40" y1="666" x2="1240" y2="666" stroke="#E2E8F0"/><text x="1240" y="696" text-anchor="end" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748B">18 / 22</text>
  <path d="M0 692 H1280 V720 H0 Z" fill="#8F1D3A"/>
</svg>
