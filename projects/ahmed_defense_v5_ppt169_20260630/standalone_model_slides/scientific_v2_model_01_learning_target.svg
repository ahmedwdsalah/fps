<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L11,6 L1,11 Z" fill="#8F1D3A"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <path d="M0 0 H1280 V18 H0 Z" fill="#8F1D3A"/>
  <path d="M0 18 H1280 V28 H0 Z" fill="#F4511E"/>
  <path d="M0 692 H1280 V720 H0 Z" fill="#8F1D3A"/>

  <text x="64" y="76" font-family="'Styrene A','Helvetica Neue',Arial,sans-serif" font-size="31" font-weight="700" fill="#191919">The learning target is the fastest algorithm, not the sorted output</text>
  <line x1="64" y1="104" x2="1216" y2="104" stroke="#E2E8F0" stroke-width="1.5"/>

  <rect x="76" y="148" width="1128" height="370" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="120" y="190" font-family="'Anthropic Sans','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="700" fill="#64748B">per-instance algorithm selection formulation</text>

  <rect x="120" y="238" width="208" height="150" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.2"/>
  <text x="224" y="274" text-anchor="middle" font-family="'Anthropic Sans','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#191919">problem instance</text>
  <text x="224" y="326" text-anchor="middle" font-family="Consolas,'Courier New',monospace" font-size="34" font-weight="700" fill="#8F1D3A">x</text>
  <text x="224" y="358" text-anchor="middle" font-family="'Anthropic Sans','Helvetica Neue',Arial,sans-serif" font-size="16" fill="#64748B">one numeric array</text>

  <path d="M348 313 H430" stroke="#8F1D3A" stroke-width="2.6" marker-end="url(#arr)"/>
  <text x="389" y="294" text-anchor="middle" font-family="Consolas,'Courier New',monospace" font-size="17" fill="#64748B">f(·)</text>

  <rect x="454" y="238" width="236" height="150" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.2"/>
  <text x="572" y="274" text-anchor="middle" font-family="'Anthropic Sans','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#191919">feature representation</text>
  <text x="572" y="326" text-anchor="middle" font-family="Consolas,'Courier New',monospace" font-size="31" font-weight="700" fill="#8F1D3A">f(x) ∈ R^16</text>
  <text x="572" y="358" text-anchor="middle" font-family="'Anthropic Sans','Helvetica Neue',Arial,sans-serif" font-size="16" fill="#64748B">structural signals only</text>

  <path d="M710 313 H792" stroke="#8F1D3A" stroke-width="2.6" marker-end="url(#arr)"/>
  <text x="751" y="294" text-anchor="middle" font-family="Consolas,'Courier New',monospace" font-size="17" fill="#64748B">S(·)</text>

  <rect x="816" y="238" width="244" height="150" rx="6" fill="#191919"/>
  <text x="938" y="274" text-anchor="middle" font-family="'Anthropic Sans','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">selection mapping</text>
  <text x="938" y="326" text-anchor="middle" font-family="Consolas,'Courier New',monospace" font-size="27" font-weight="700" fill="#F4511E">S(f(x)) → A</text>
  <text x="938" y="358" text-anchor="middle" font-family="'Anthropic Sans','Helvetica Neue',Arial,sans-serif" font-size="16" fill="#CBD5E1">choose before execution</text>

  <path d="M1080 313 H1140" stroke="#8F1D3A" stroke-width="2.6" marker-end="url(#arr)"/>
  <text x="1110" y="294" text-anchor="middle" font-family="Consolas,'Courier New',monospace" font-size="17" fill="#64748B">a</text>

  <text x="1114" y="278" font-family="'Anthropic Sans','Helvetica Neue',Arial,sans-serif" font-size="17" fill="#191919">introsort</text>
  <text x="1114" y="316" font-family="'Anthropic Sans','Helvetica Neue',Arial,sans-serif" font-size="17" fill="#191919">heapsort</text>
  <text x="1114" y="354" font-family="'Anthropic Sans','Helvetica Neue',Arial,sans-serif" font-size="17" fill="#191919">timsort</text>

  <rect x="164" y="558" width="952" height="70" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.3"/>
  <text x="640" y="589" text-anchor="middle" font-family="Consolas,'Courier New',monospace" font-size="23" fill="#191919">D = {( f(x_i), y_i )},        y_i = argmin_a T(a, x_i)</text>
  <text x="640" y="616" text-anchor="middle" font-family="'Anthropic Sans','Helvetica Neue',Arial,sans-serif" font-size="16" fill="#64748B">the label comes from measured runtime over candidate algorithms</text>
</svg>
