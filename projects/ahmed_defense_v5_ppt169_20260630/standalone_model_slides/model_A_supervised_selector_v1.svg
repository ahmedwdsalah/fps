  <text x="1153" y="325" text-anchor="middle" font-family="'Anthropic Sans','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="700" fill="#191919">heapsort</text>
  <text x="1153" y="394" text-anchor="middle" font-family="'Anthropic Sans','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">timsort</text>

