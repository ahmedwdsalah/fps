  <text x="1146" y="336" text-anchor="middle" font-family="'Anthropic Sans','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" transform="rotate(-90 1146 336)">stratified split</text>

  <rect x="236" y="486" width="808" height="48" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.2"/>
  <text x="640" y="517" text-anchor="middle" font-family="'Anthropic Sans','Helvetica Neue',Arial,sans-serif" font-size="18" fill="#64748B">the goal is not to memorize the majority class, but to learn where algorithm choice changes</text>
