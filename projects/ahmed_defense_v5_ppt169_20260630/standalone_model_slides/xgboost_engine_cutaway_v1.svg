  <rect x="238" y="592" width="804" height="42" rx="21" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.2"/>
  <text x="640" y="619" text-anchor="middle" font-family="'Anthropic Sans','Helvetica Neue',Arial,sans-serif" font-size="17" fill="#64748B">the architecture is sequential correction: each added tree improves the current ensemble</text>
