  <text x="110" y="448" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#64748B">values, order, duplicates, runs</text>

  <path d="M430 326 H526" stroke="#D97757" stroke-width="4"/><path d="M526 326 L506 314 V338 Z" fill="#D97757"/>
  <rect x="556" y="178" width="270" height="300" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
