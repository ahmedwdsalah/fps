  <text x="586" y="278" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">cheap features</text>
  <text x="586" y="326" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">trained model</text>
  <text x="586" y="374" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">one class output</text>

  <path d="M864 326 H960" stroke="#D97757" stroke-width="4"/><path d="M960 326 L940 314 V338 Z" fill="#D97757"/>
  <rect x="990" y="178" width="210" height="300" rx="8" fill="#191919"/>
  <text x="1095" y="260" text-anchor="middle" font-family="'Styrene A', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#FFFFFF">Intro</text>
  <text x="1095" y="314" text-anchor="middle" font-family="'Styrene A', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#FFFFFF">Heap</text>
  <text x="1095" y="368" text-anchor="middle" font-family="'Styrene A', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#D97757">Tim</text>

  <text x="80" y="560" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" fill="#191919">This is not replacing sorting.</text>
  <text x="80" y="600" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" fill="#191919">It is choosing the better implementation for this input.</text>
