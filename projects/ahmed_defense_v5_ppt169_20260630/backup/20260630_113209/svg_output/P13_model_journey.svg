<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="70" fill="#191919"/><rect x="0" y="0" width="8" height="70" fill="#D97757"/>
  <text x="40" y="44" font-family="'Styrene A', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">v5 was chosen after weaker paths were rejected</text>
  <rect x="0" y="70" width="1280" height="50" fill="#F8FAFC"/><rect x="40" y="86" width="4" height="18" fill="#D97757"/>
  <text x="58" y="103" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#191919">The research journey matters because it explains why the final model is measured, not accidental.</text>
  <image href="../images/F3_model_evolution.png" x="80" y="150" width="1120" height="270" preserveAspectRatio="xMidYMid meet"/>
  <rect x="92" y="455" width="238" height="105" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/><text x="116" y="496" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#191919">Regression</text><text x="116" y="532" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#64748B">not enough</text>
  <rect x="370" y="455" width="238" height="105" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/><text x="394" y="496" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#191919">Timing feature</text><text x="394" y="532" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#64748B">not deployable</text>
  <rect x="648" y="455" width="238" height="105" rx="8" fill="#191919"/><text x="672" y="496" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">v5 classifier</text><text x="672" y="532" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#D97757">final main model</text>
  <rect x="926" y="455" width="238" height="105" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/><text x="950" y="496" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#191919">Strict checks</text><text x="950" y="532" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#64748B">kept as evidence</text>
  <line x1="40" y1="666" x2="1240" y2="666" stroke="#E2E8F0"/><text x="40" y="696" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748B">Model evolution</text><text x="1240" y="696" text-anchor="end" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748B">13 / 22</text>
