<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#1b1f27" flood-opacity="0.08"/>
    </filter>
    <style>
      .title{font-family:Arial, Helvetica, sans-serif;font-size:45px;font-weight:800;fill:#1b1b1d}
      .sub{font-family:Arial, Helvetica, sans-serif;font-size:24px;fill:#222}
      .cardTitle{font-family:Arial, Helvetica, sans-serif;font-size:31px;font-weight:800;fill:#1b1b1d}
      .body{font-family:Arial, Helvetica, sans-serif;font-size:24px;fill:#566882}
      .smallBold{font-family:Arial, Helvetica, sans-serif;font-size:22px;font-weight:800;fill:#1b1b1d}
      .small{font-family:Arial, Helvetica, sans-serif;font-size:22px;fill:#1f2937}
      .card{fill:#fff;stroke:#dbe4ef;stroke-width:1.5;rx:12}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#ffffff"/>
  <rect x="0" y="0" width="1600" height="24" fill="#9A173D"/>
  <rect x="0" y="24" width="1600" height="8" fill="#F4511E"/>
  <rect x="0" y="860" width="1600" height="40" fill="#9A173D"/>
  <text x="64" y="94" class="title">Algorithm selection background</text>
  <text x="64" y="138" class="sub">The thesis connects sorting to algorithm selection, adaptive behavior, and runtime prediction.</text>
  <rect x="64" y="172" width="1472" height="5" fill="#d8e0ea"/>

  <g transform="translate(92,238)">
    <rect width="410" height="440" class="card" filter="url(#shadow)"/>
    <text x="38" y="68" class="cardTitle">Algorithm selection</text>
    <text x="38" y="132" class="body">Choose a solver from</text>
    <text x="38" y="170" class="body">measurable problem features.</text>
    <g transform="translate(38,242)">
      <text x="0" y="0" class="smallBold">In this thesis</text>
      <rect x="0" y="22" width="320" height="2" fill="#d8e0ea"/>
      <text x="0" y="66" class="small">sorting choice becomes</text>
      <text x="0" y="100" class="small">supervised algorithm selection.</text>
    </g>
  </g>

  <g transform="translate(595,238)">
    <rect width="410" height="440" class="card" filter="url(#shadow)"/>
    <text x="38" y="68" class="cardTitle">Adaptive sorting</text>
    <text x="38" y="132" class="body">Existing order, runs, and</text>
    <text x="38" y="170" class="body">duplicates change runtime.</text>
    <g transform="translate(38,242)">
      <text x="0" y="0" class="smallBold">In this thesis</text>
      <rect x="0" y="22" width="320" height="2" fill="#d8e0ea"/>
      <text x="0" y="66" class="small">structural descriptors expose</text>
      <text x="0" y="100" class="small">these input signals.</text>
    </g>
  </g>

  <g transform="translate(1098,238)">
    <rect width="410" height="440" class="card" filter="url(#shadow)"/>
    <text x="38" y="68" class="cardTitle">Performance models</text>
    <text x="38" y="132" class="body">Prediction is useful only</text>
    <text x="38" y="170" class="body">when it reduces runtime loss.</text>
    <g transform="translate(38,242)">
      <text x="0" y="0" class="smallBold">In this thesis</text>
      <rect x="0" y="22" width="320" height="2" fill="#d8e0ea"/>
      <text x="0" y="66" class="small">regret and gap closed matter,</text>
      <text x="0" y="100" class="small">not accuracy alone.</text>
    </g>
  </g>

  <text x="1535" y="888" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#ffffff">5/24</text>
</svg>
