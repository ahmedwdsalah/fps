<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1b1f27" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F4511E"/>
    </marker>
    <marker id="arrowMaroon" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9A173D"/>
    </marker>
    <style>
      .title{font-family:Arial, Helvetica, sans-serif;font-size:45px;font-weight:800;fill:#1b1b1d;letter-spacing:0}
      .small{font-family:Arial, Helvetica, sans-serif;font-size:18px;fill:#566882;letter-spacing:0}
      .label{font-family:Arial, Helvetica, sans-serif;font-size:21px;font-weight:700;fill:#1b1b1d;letter-spacing:0}
      .body{font-family:Arial, Helvetica, sans-serif;font-size:19px;fill:#526278;letter-spacing:0}
      .mono{font-family:Menlo, Consolas, monospace;font-size:18px;fill:#1f2937}
      .monoSmall{font-family:Menlo, Consolas, monospace;font-size:15px;fill:#5d6c80}
      .card{fill:#ffffff;stroke:#dbe4ef;stroke-width:1.4;rx:12}
      .soft{fill:#f7f9fc;stroke:#dde6f0;stroke-width:1.2;rx:12}
      .chip{fill:#f6f8fb;stroke:#d8e0ea;stroke-width:1;rx:14}
      .orange{fill:#F4511E}
      .maroon{fill:#9A173D}
      .mutedLine{stroke:#d8e0ea;stroke-width:5}
    </style>
  </defs>

  <rect width="1600" height="900" fill="#ffffff"/>
  <rect x="0" y="0" width="1600" height="24" fill="#9A173D"/>
  <rect x="0" y="24" width="1600" height="8" fill="#F4511E"/>
  <rect x="0" y="860" width="1600" height="40" fill="#9A173D"/>

  <text x="64" y="94" class="title">Algorithm portfolio defines the selector’s decision space</text>
  <rect x="64" y="136" width="1472" height="5" fill="#d8e0ea"/>

  <g transform="translate(82,185)">
    <rect x="0" y="0" width="340" height="455" class="card" filter="url(#softShadow)"/>
    <text x="38" y="58" class="label">Introsort</text>
    <rect x="36" y="84" width="122" height="30" class="chip"/>
    <text x="54" y="105" class="small">hybrid default</text>
    <text x="38" y="155" class="body">Quicksort-style partitioning</text>
    <text x="38" y="187" class="body">with fallback protection.</text>

    <g transform="translate(42,235)">
      <line x1="0" y1="86" x2="250" y2="86" stroke="#d8e0ea" stroke-width="2"/>
      <path d="M5 74 C45 28, 92 18, 136 44 S220 72, 248 18" fill="none" stroke="#9A173D" stroke-width="5"/>
      <circle cx="5" cy="74" r="4" fill="#9A173D"/>
      <circle cx="136" cy="44" r="4" fill="#9A173D"/>
      <circle cx="248" cy="18" r="4" fill="#9A173D"/>
      <text x="0" y="125" class="monoSmall">strong baseline behavior</text>
    </g>

    <rect x="36" y="385" width="268" height="44" rx="8" fill="#fbfcfe" stroke="#e4eaf2"/>
    <text x="54" y="413" class="monoSmall">candidate action a₁</text>
  </g>

  <g transform="translate(630,185)">
    <rect x="0" y="0" width="340" height="455" class="card" filter="url(#softShadow)"/>
    <text x="38" y="58" class="label">Heapsort</text>
    <rect x="36" y="84" width="142" height="30" class="chip"/>
    <text x="54" y="105" class="small">worst-case bound</text>
    <text x="38" y="155" class="body">Consistent comparison sort</text>
    <text x="38" y="187" class="body">used as a measured class.</text>

    <g transform="translate(55,235)">
      <line x1="115" y1="20" x2="55" y2="80" stroke="#6c7d95" stroke-width="4"/>
      <line x1="115" y1="20" x2="175" y2="80" stroke="#6c7d95" stroke-width="4"/>
      <line x1="55" y1="80" x2="25" y2="132" stroke="#6c7d95" stroke-width="4"/>
      <line x1="55" y1="80" x2="85" y2="132" stroke="#6c7d95" stroke-width="4"/>
      <line x1="175" y1="80" x2="145" y2="132" stroke="#6c7d95" stroke-width="4"/>
      <line x1="175" y1="80" x2="205" y2="132" stroke="#6c7d95" stroke-width="4"/>
      <circle cx="115" cy="20" r="18" fill="#9A173D"/>
      <circle cx="55" cy="80" r="16" fill="#F4511E"/>
      <circle cx="175" cy="80" r="16" fill="#F4511E"/>
      <circle cx="25" cy="132" r="14" fill="#eef3f8" stroke="#cfd9e6"/>
      <circle cx="85" cy="132" r="14" fill="#eef3f8" stroke="#cfd9e6"/>
      <circle cx="145" cy="132" r="14" fill="#eef3f8" stroke="#cfd9e6"/>
      <circle cx="205" cy="132" r="14" fill="#eef3f8" stroke="#cfd9e6"/>
      <text x="2" y="178" class="monoSmall">robust comparison path</text>
    </g>

    <rect x="36" y="385" width="268" height="44" rx="8" fill="#fbfcfe" stroke="#e4eaf2"/>
    <text x="54" y="413" class="monoSmall">candidate action a₂</text>
  </g>

  <g transform="translate(1178,185)">
    <rect x="0" y="0" width="340" height="455" class="card" filter="url(#softShadow)"/>
    <text x="38" y="58" class="label">Timsort</text>
    <rect x="36" y="84" width="136" height="30" rx="14" fill="#fff2ed" stroke="#ffd2c2"/>
    <text x="54" y="105" class="small" fill="#9A173D">run-adaptive</text>
    <text x="38" y="155" class="body">Exploits existing order and</text>
    <text x="38" y="187" class="body">natural runs in the input.</text>

    <g transform="translate(42,235)">
      <line x1="0" y1="105" x2="250" y2="105" stroke="#d8e0ea" stroke-width="2"/>
      <rect x="4" y="74" width="28" height="31" rx="3" fill="#dce5ef"/>
      <rect x="38" y="66" width="28" height="39" rx="3" fill="#dce5ef"/>
      <rect x="72" y="54" width="28" height="51" rx="3" fill="#dce5ef"/>
      <rect x="112" y="16" width="28" height="89" rx="3" fill="#F4511E"/>
      <rect x="146" y="22" width="28" height="83" rx="3" fill="#F4511E"/>
      <rect x="180" y="28" width="28" height="77" rx="3" fill="#F4511E"/>
      <rect x="222" y="93" width="20" height="12" rx="3" fill="#BA1734"/>
      <path d="M112 126 H208" stroke="#F4511E" stroke-width="5" stroke-linecap="round"/>
      <text x="42" y="158" class="monoSmall">natural runs become signal</text>
    </g>

    <rect x="36" y="385" width="268" height="44" rx="8" fill="#fbfcfe" stroke="#e4eaf2"/>
    <text x="54" y="413" class="monoSmall">candidate action a₃</text>
  </g>

  <path d="M431 405 H585" stroke="#F4511E" stroke-width="4" marker-end="url(#arrowOrange)"/>
  <path d="M979 405 H1133" stroke="#F4511E" stroke-width="4" marker-end="url(#arrowOrange)"/>

  <g transform="translate(410,676)">
    <rect x="0" y="0" width="780" height="102" class="soft"/>
    <text x="32" y="42" class="mono">A = { introsort, heapsort, timsort }</text>
    <text x="32" y="76" class="body">The selector chooses one implementation before sorting; VBS is used only as the evaluation oracle.</text>
  </g>

  <text x="1535" y="888" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#ffffff">12/24</text>
</svg>
