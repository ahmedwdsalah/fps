<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#1b1f27" flood-opacity="0.08"/>
    </filter>
    <style>
      .title{font-family:Arial, Helvetica, sans-serif;font-size:45px;font-weight:800;fill:#1b1b1d}
      .sub{font-family:Arial, Helvetica, sans-serif;font-size:24px;fill:#222}
      .h{font-family:Arial, Helvetica, sans-serif;font-size:24px;font-weight:800;fill:#1b1b1d}
      .b{font-family:Arial, Helvetica, sans-serif;font-size:20px;fill:#526278}
      .small{font-family:Arial, Helvetica, sans-serif;font-size:17px;fill:#526278}
      .mono{font-family:Menlo, Consolas, monospace;font-size:16px;fill:#9A173D}
      .card{fill:#ffffff;stroke:#dbe4ef;stroke-width:1.4;rx:12}
      .soft{fill:#f8fafc;stroke:#dbe4ef;stroke-width:1.4;rx:12}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#ffffff"/>
  <rect x="0" y="0" width="1600" height="24" fill="#9A173D"/>
  <rect x="0" y="24" width="1600" height="8" fill="#F4511E"/>
  <rect x="0" y="860" width="1600" height="40" fill="#9A173D"/>

  <text x="64" y="94" class="title">F1 routing was treated as a separate specialization</text>
  <text x="64" y="138" class="sub">The main result remains v5; the F1 flag/channel route explains the hardest domain.</text>
  <rect x="64" y="172" width="1472" height="5" fill="#d8e0ea"/>

  <g transform="translate(70,218)">
    <rect width="980" height="530" class="card" filter="url(#shadow)"/>
    <image href="/Users/ahmed/Desktop/thesis/My-Master-thesis/projects/ahmed_defense_v5_ppt169_20260630/standalone_motivation_slides/F6_channel_routing_trimmed.png" x="28" y="30" width="924" height="470" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g transform="translate(1100,218)">
    <rect width="390" height="136" class="soft"/>
    <text x="28" y="46" class="h">Main track</text>
    <text x="28" y="82" class="b">v5 general selector</text>
    <text x="28" y="112" class="mono">all domains · 3 algorithms</text>

    <rect y="170" width="390" height="166" class="card"/>
    <text x="28" y="218" class="h">F1 specialization</text>
    <text x="28" y="256" class="b">channel flag routes F1 arrays</text>
    <text x="28" y="286" class="b">to specialised channel models.</text>
    <text x="28" y="318" class="mono">flag / channel route</text>

    <rect y="374" width="390" height="156" class="card"/>
    <text x="28" y="422" class="h">Claim boundary</text>
    <text x="28" y="460" class="b">This does not replace v5.</text>
    <text x="28" y="490" class="b">It stays separate from the</text>
    <text x="28" y="520" class="b">main cross-domain result.</text>
  </g>

  <text x="1535" y="888" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#ffffff">21/25</text>
</svg>
