<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#1b1f27" flood-opacity="0.08"/>
    </filter>
    <style>
      .title{font-family:Arial, Helvetica, sans-serif;font-size:45px;font-weight:800;fill:#1b1b1d}
      .sub{font-family:Arial, Helvetica, sans-serif;font-size:24px;fill:#222}
      .h{font-family:Arial, Helvetica, sans-serif;font-size:27px;font-weight:800;fill:#1b1b1d}
      .b{font-family:Arial, Helvetica, sans-serif;font-size:22px;fill:#526278}
      .small{font-family:Arial, Helvetica, sans-serif;font-size:19px;fill:#526278}
      .mono{font-family:Menlo, Consolas, monospace;font-size:17px;fill:#9A173D}
      .card{fill:#ffffff;stroke:#dbe4ef;stroke-width:1.4;rx:12}
      .soft{fill:#f8fafc;stroke:#dbe4ef;stroke-width:1.4;rx:12}
      .rule{stroke:#d8e0ea;stroke-width:2}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#ffffff"/>
  <rect x="0" y="0" width="1600" height="24" fill="#9A173D"/>
  <rect x="0" y="24" width="1600" height="8" fill="#F4511E"/>
  <rect x="0" y="860" width="1600" height="40" fill="#9A173D"/>

  <text x="64" y="94" class="title">Prior work positions the task as algorithm selection</text>
  <text x="64" y="138" class="sub">Input sensitivity, feature-based solver selection, and learned sorting define the boundary.</text>
  <rect x="64" y="172" width="1472" height="5" fill="#d8e0ea"/>

  <g transform="translate(96,238)">
    <rect width="420" height="370" class="card" filter="url(#shadow)"/>
    <text x="40" y="62" class="h">Input-sensitive sorting</text>
    <text x="40" y="112" class="b">Sundaramoorthy, Raman,</text>
    <text x="40" y="146" class="b">Gelling and Jugé show</text>
    <text x="40" y="180" class="b">structure affects runtime.</text>
    <line x1="40" y1="220" x2="360" y2="220" class="rule"/>
    <text x="40" y="266" class="small">Used here as structural features:</text>
    <text x="40" y="304" class="mono">runs · sortedness · duplicates</text>
  </g>

  <g transform="translate(590,238)">
    <rect width="420" height="370" class="card" filter="url(#shadow)"/>
    <text x="40" y="62" class="h">Algorithm selection</text>
    <text x="40" y="112" class="b">Rice formalised P, F, A, Y.</text>
    <text x="40" y="146" class="b">SATzilla made feature-based</text>
    <text x="40" y="180" class="b">solver selection practical.</text>
    <line x1="40" y1="220" x2="360" y2="220" class="rule"/>
    <text x="40" y="266" class="small">Used here as selection mapping:</text>
    <text x="40" y="304" class="mono">S : f(x) → A</text>
  </g>

  <g transform="translate(1084,238)">
    <rect width="420" height="370" class="card" filter="url(#shadow)"/>
    <text x="40" y="62" class="h">Learning changes different things</text>
    <text x="40" y="112" class="b">AlphaDev discovers code;</text>
    <text x="40" y="146" class="b">Sorting with Predictions</text>
    <text x="40" y="180" class="b">modifies sorting internals.</text>
    <line x1="40" y1="220" x2="360" y2="220" class="rule"/>
    <text x="40" y="266" class="small">Selection happens before sorting:</text>
    <text x="40" y="304" class="mono">no new routine · no internal change</text>
  </g>

  <g transform="translate(300,672)">
    <rect x="0" y="0" width="1000" height="96" class="soft"/>
    <text x="36" y="40" class="h">Resulting task:</text>
    <text x="36" y="72" class="b">Learn S : F → A for numeric arrays, using empirical runtime as Y.</text>
  </g>
</svg>
