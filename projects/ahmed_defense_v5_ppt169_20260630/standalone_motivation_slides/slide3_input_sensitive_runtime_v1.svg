<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#1b1f27" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#F4511E"/>
    </marker>
    <style>
      .title{font-family:Arial, Helvetica, sans-serif;font-size:45px;font-weight:800;fill:#1b1b1d}
      .sub{font-family:Arial, Helvetica, sans-serif;font-size:24px;fill:#222}
      .h{font-family:Arial, Helvetica, sans-serif;font-size:23px;font-weight:800;fill:#1b1b1d}
      .hSmall{font-family:Arial, Helvetica, sans-serif;font-size:22px;font-weight:800;fill:#1b1b1d}
      .b{font-family:Arial, Helvetica, sans-serif;font-size:18px;fill:#526278}
      .mono{font-family:Menlo, Consolas, monospace;font-size:15px;fill:#526278}
      .card{fill:#ffffff;stroke:#dbe4ef;stroke-width:1.4;rx:12}
      .soft{fill:#f8fafc;stroke:#dbe4ef;stroke-width:1.4;rx:12}
      .accent{fill:#9A173D}
      .orange{fill:#F4511E}
      .blue{fill:#2F7DB7}
      .pale{fill:#dce5ef}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#ffffff"/>
  <rect x="0" y="0" width="1600" height="24" fill="#9A173D"/>
  <rect x="0" y="24" width="1600" height="8" fill="#F4511E"/>
  <rect x="0" y="860" width="1600" height="40" fill="#9A173D"/>

  <text x="64" y="94" class="title">Sorting runtime depends on input structure</text>
  <text x="64" y="138" class="sub">Size alone does not determine which algorithm is fastest.</text>
  <rect x="64" y="172" width="1472" height="5" fill="#d8e0ea"/>

  <g transform="translate(78,226)">
    <rect width="340" height="410" class="card" filter="url(#shadow)"/>
    <text x="32" y="52" class="h">Existing order</text>
    <text x="32" y="84" class="b">runs and presortedness</text>
    <g transform="translate(34,132)">
      <line x1="0" y1="142" x2="270" y2="142" stroke="#d8e0ea" stroke-width="2"/>
      <rect x="8" y="108" width="24" height="34" rx="3" class="pale"/>
      <rect x="40" y="98" width="24" height="44" rx="3" class="pale"/>
      <rect x="72" y="88" width="24" height="54" rx="3" class="pale"/>
      <rect x="116" y="28" width="28" height="114" rx="3" class="orange"/>
      <rect x="152" y="34" width="28" height="108" rx="3" class="orange"/>
      <rect x="188" y="42" width="28" height="100" rx="3" class="orange"/>
      <rect x="234" y="130" width="22" height="12" rx="3" class="accent"/>
      <path d="M116 168 H216" stroke="#F4511E" stroke-width="5" stroke-linecap="round"/>
    </g>
    <text x="32" y="342" class="mono">longest_run_ratio</text>
    <text x="32" y="370" class="mono">adj_sorted_ratio</text>
  </g>

  <g transform="translate(446,226)">
    <rect width="340" height="410" class="card" filter="url(#shadow)"/>
    <text x="32" y="52" class="h">Duplicate concentration</text>
    <text x="32" y="84" class="b">repetition and low diversity</text>
    <g transform="translate(42,136)">
      <circle cx="40" cy="40" r="22" fill="#F4511E"/>
      <circle cx="92" cy="40" r="22" fill="#F4511E"/>
      <circle cx="144" cy="40" r="22" fill="#F4511E"/>
      <circle cx="196" cy="40" r="22" fill="#F4511E"/>
      <circle cx="248" cy="40" r="22" fill="#9A173D"/>
      <circle cx="40" cy="104" r="22" fill="#F4511E"/>
      <circle cx="92" cy="104" r="22" fill="#F4511E"/>
      <circle cx="144" cy="104" r="22" fill="#F4511E"/>
      <circle cx="196" cy="104" r="22" fill="#dce5ef"/>
      <circle cx="248" cy="104" r="22" fill="#dce5ef"/>
      <line x1="20" y1="168" x2="270" y2="168" stroke="#d8e0ea" stroke-width="2"/>
      <rect x="28" y="142" width="58" height="26" rx="3" fill="#9A173D"/>
      <rect x="100" y="154" width="58" height="14" rx="3" fill="#F4511E"/>
      <rect x="172" y="160" width="58" height="8" rx="3" fill="#dce5ef"/>
    </g>
    <text x="32" y="342" class="mono">duplicate_ratio</text>
    <text x="32" y="370" class="mono">top5_freq_ratio</text>
  </g>

  <g transform="translate(814,226)">
    <rect width="340" height="410" class="card" filter="url(#shadow)"/>
    <text x="32" y="52" class="h">Distribution shape</text>
    <text x="32" y="84" class="b">spread, outliers, heavy tails</text>
    <g transform="translate(34,128)">
      <line x1="0" y1="170" x2="270" y2="170" stroke="#d8e0ea" stroke-width="2"/>
      <rect x="18" y="126" width="22" height="44" rx="3" class="pale"/>
      <rect x="52" y="96" width="22" height="74" rx="3" class="pale"/>
      <rect x="86" y="62" width="22" height="108" rx="3" fill="#2F7DB7"/>
      <rect x="120" y="36" width="22" height="134" rx="3" fill="#2F7DB7"/>
      <rect x="154" y="72" width="22" height="98" rx="3" fill="#2F7DB7"/>
      <rect x="188" y="118" width="22" height="52" rx="3" class="pale"/>
      <circle cx="248" cy="30" r="11" fill="#9A173D"/>
      <path d="M210 126 C226 78, 236 46, 248 30" fill="none" stroke="#9A173D" stroke-width="4"/>
    </g>
    <text x="32" y="342" class="mono">outlier_ratio</text>
    <text x="32" y="370" class="mono">kurtosis_excess</text>
  </g>

  <g transform="translate(1182,226)">
    <rect width="340" height="410" class="card" filter="url(#shadow)"/>
    <text x="32" y="52" class="hSmall">Same size,</text>
    <text x="32" y="80" class="hSmall">different behavior</text>
    <text x="32" y="112" class="b">candidate runtimes can change</text>
    <g transform="translate(34,154)">
      <rect x="0" y="0" width="270" height="172" class="soft"/>
      <text x="24" y="38" class="mono">x ∈ X</text>
      <text x="24" y="72" class="mono">f(x): structural features</text>
      <path d="M34 108 H226" stroke="#F4511E" stroke-width="4" marker-end="url(#arrow)"/>
      <rect x="28" y="132" width="62" height="24" rx="12" fill="#ffffff" stroke="#9A173D"/>
      <text x="59" y="150" text-anchor="middle" class="mono" font-size="12">intro</text>
      <rect x="104" y="132" width="62" height="24" rx="12" fill="#ffffff" stroke="#9A173D"/>
      <text x="135" y="150" text-anchor="middle" class="mono" font-size="12">heap</text>
      <rect x="180" y="132" width="62" height="24" rx="12" fill="#F4511E" stroke="#F4511E"/>
      <text x="211" y="150" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="12" fill="#ffffff">tim</text>
    </g>
    <text x="32" y="354" class="mono">no single algorithm</text>
    <text x="32" y="382" class="mono">dominates all inputs</text>
  </g>

  <g transform="translate(270,684)">
    <rect x="0" y="0" width="1060" height="92" class="soft"/>
    <text x="34" y="38" class="h">No single algorithm is uniformly best across input structures.</text>
    <text x="34" y="68" class="b">The selector must decide before sorting, using structural features rather than measured portfolio runtimes.</text>
  </g>

  <text x="1535" y="888" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#ffffff">3/25</text>
</svg>
