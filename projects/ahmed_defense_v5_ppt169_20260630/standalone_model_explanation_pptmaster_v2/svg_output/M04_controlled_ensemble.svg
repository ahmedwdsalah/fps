<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#F4511E"/>
    </marker>
  </defs>
  <g id="background">
    <rect width="1280" height="720" fill="#FFFFFF"/>
    <path d="M0 0 H1280 V18 H0 Z" fill="#8F1D3A"/>
    <path d="M0 18 H1280 V28 H0 Z" fill="#F4511E"/>
    <path d="M0 692 H1280 V720 H0 Z" fill="#8F1D3A"/>
  </g>
  <g id="header">
    <text x="64" y="82" font-family="'Styrene A', 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="#191919">The ensemble is powerful because each correction is constrained</text>
    <line x1="64" y1="110" x2="1216" y2="110" stroke="#E2E8F0" stroke-width="2"/>
  </g>

  <g id="centralEnsemble">
    <line x1="258" y1="356" x2="344" y2="356" stroke="#CBD5E1" stroke-width="2"/>
    <line x1="936" y1="356" x2="1022" y2="356" stroke="#CBD5E1" stroke-width="2"/>
    <text x="172" y="363" text-anchor="middle" font-family="'Anthropic Sans', Arial, sans-serif" font-size="20" font-weight="700" fill="#191919">feature vector</text>
    <text x="1110" y="363" text-anchor="middle" font-family="'Anthropic Sans', Arial, sans-serif" font-size="20" font-weight="700" fill="#191919">probabilities</text>

    <g id="trees">
      <rect x="358" y="246" width="92" height="220" fill="#FFFFFF" stroke="#8F1D3A" stroke-width="2" rx="4"/>
      <path d="M404 284 V410 M368 326 H440 M404 326 L376 410 M404 326 L432 410" stroke="#8F1D3A" stroke-width="2.5" fill="none"/>
      <rect x="478" y="220" width="92" height="246" fill="#FFFFFF" stroke="#D97757" stroke-width="2" rx="4"/>
      <path d="M524 258 V414 M488 304 H560 M524 304 L496 414 M524 304 L552 414" stroke="#D97757" stroke-width="2.5" fill="none"/>
      <rect x="598" y="194" width="92" height="272" fill="#FFFFFF" stroke="#F4511E" stroke-width="2" rx="4"/>
      <path d="M644 232 V418 M608 288 H680 M644 288 L616 418 M644 288 L672 418" stroke="#F4511E" stroke-width="2.5" fill="none"/>
      <rect x="718" y="220" width="92" height="246" fill="#FFFFFF" stroke="#D97757" stroke-width="2" rx="4"/>
      <path d="M764 258 V414 M728 304 H800 M764 304 L736 414 M764 304 L792 414" stroke="#D97757" stroke-width="2.5" fill="none"/>
      <rect x="838" y="246" width="92" height="220" fill="#FFFFFF" stroke="#8F1D3A" stroke-width="2" rx="4"/>
      <path d="M884 284 V410 M848 326 H920 M884 326 L856 410 M884 326 L912 410" stroke="#8F1D3A" stroke-width="2.5" fill="none"/>
    </g>
  </g>

  <g id="topControls">
    <rect x="156" y="150" width="220" height="60" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" rx="4"/>
    <text x="266" y="188" text-anchor="middle" font-family="'Anthropic Sans', Arial, sans-serif" font-size="19" font-weight="700" fill="#191919">learning rate 0.05</text>
    <line x1="376" y1="180" x2="466" y2="244" stroke="#F4511E" stroke-width="3" marker-end="url(#arrowOrange)"/>

    <rect x="530" y="136" width="220" height="60" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" rx="4"/>
    <text x="640" y="174" text-anchor="middle" font-family="'Anthropic Sans', Arial, sans-serif" font-size="19" font-weight="700" fill="#191919">depth 7</text>
    <line x1="640" y1="196" x2="640" y2="230" stroke="#F4511E" stroke-width="3" marker-end="url(#arrowOrange)"/>

    <rect x="904" y="150" width="220" height="60" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" rx="4"/>
    <text x="1014" y="188" text-anchor="middle" font-family="'Anthropic Sans', Arial, sans-serif" font-size="19" font-weight="700" fill="#191919">500 trees</text>
    <line x1="904" y1="180" x2="814" y2="244" stroke="#F4511E" stroke-width="3" marker-end="url(#arrowOrange)"/>
  </g>

  <g id="bottomControls">
    <rect x="156" y="584" width="220" height="56" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" rx="4"/>
    <text x="266" y="619" text-anchor="middle" font-family="'Anthropic Sans', Arial, sans-serif" font-size="19" font-weight="700" fill="#191919">row sample 80%</text>
    <line x1="376" y1="584" x2="468" y2="468" stroke="#D97757" stroke-width="3" marker-end="url(#arrowOrange)"/>

    <rect x="530" y="584" width="220" height="56" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" rx="4"/>
    <text x="640" y="619" text-anchor="middle" font-family="'Anthropic Sans', Arial, sans-serif" font-size="19" font-weight="700" fill="#191919">feature sample 80%</text>
    <line x1="640" y1="584" x2="640" y2="470" stroke="#D97757" stroke-width="3" marker-end="url(#arrowOrange)"/>

    <rect x="904" y="584" width="220" height="56" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" rx="4"/>
    <text x="1014" y="619" text-anchor="middle" font-family="'Anthropic Sans', Arial, sans-serif" font-size="19" font-weight="700" fill="#191919">L1 / L2 regularisation</text>
    <line x1="904" y1="584" x2="812" y2="468" stroke="#D97757" stroke-width="3" marker-end="url(#arrowOrange)"/>
  </g>

  <g id="smallControls">
    <rect x="64" y="314" width="182" height="84" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" rx="4"/>
    <text x="155" y="348" text-anchor="middle" font-family="'Anthropic Sans', Arial, sans-serif" font-size="18" font-weight="700" fill="#191919">min child</text>
    <text x="155" y="378" text-anchor="middle" font-family="'Anthropic Sans', Arial, sans-serif" font-size="18" fill="#64748B">stops tiny leaves</text>

    <rect x="1034" y="314" width="182" height="84" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" rx="4"/>
    <text x="1125" y="348" text-anchor="middle" font-family="'Anthropic Sans', Arial, sans-serif" font-size="18" font-weight="700" fill="#191919">hist method</text>
    <text x="1125" y="378" text-anchor="middle" font-family="'Anthropic Sans', Arial, sans-serif" font-size="18" fill="#64748B">fast split search</text>
  </g>

  <g id="pagenumber">
    <text x="1240" y="710" text-anchor="end" font-family="'Anthropic Sans', Arial, sans-serif" font-size="10" fill="#FFFFFF">M04</text>
  </g>
</svg>
