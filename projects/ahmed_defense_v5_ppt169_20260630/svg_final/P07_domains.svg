  <text x="80" y="610" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">The point was to make the selector face different numeric patterns, not memorize one dataset family.</text>
