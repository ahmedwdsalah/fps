<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF" />
  <path d="M0 0 H1280 V18 H0 Z" fill="#8F1D3A" />
  <path d="M0 18 H1280 V28 H0 Z" fill="#F4511E" />
  <text x="64" y="72" font-family="'Styrene A', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#191919">The portfolio has three real choices</text>
  
  <text x="64" y="108" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#191919">The model does not rank every possible sorter; it chooses among the three measured implementations.</text>
  <path fill="#F8FAFC" stroke="#E2E8F0" d="M88,170 H412 A8,8 0 0 1 420,178 V512 A8,8 0 0 1 412,520 H88 A8,8 0 0 1 80,512 V178 A8,8 0 0 1 88,170 Z" /><text x="110" y="240" font-family="'Styrene A', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="48" font-weight="700" fill="#191919">Intro</text><text x="110" y="310" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">general-purpose hybrid</text><text x="110" y="350" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">strong default behavior</text>
  <path fill="#FFFFFF" stroke="#E2E8F0" d="M478,170 H802 A8,8 0 0 1 810,178 V512 A8,8 0 0 1 802,520 H478 A8,8 0 0 1 470,512 V178 A8,8 0 0 1 478,170 Z" /><text x="500" y="240" font-family="'Styrene A', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="42" font-weight="700" fill="#191919">Heapsort</text><text x="500" y="310" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">consistent worst-case bound</text><text x="500" y="350" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">often hard to distinguish</text>
  <path fill="#191919" d="M868,170 H1192 A8,8 0 0 1 1200,178 V512 A8,8 0 0 1 1192,520 H868 A8,8 0 0 1 860,512 V178 A8,8 0 0 1 868,170 Z" /><text x="890" y="240" font-family="'Styrene A', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="48" font-weight="700" fill="#D97757">Tim</text><text x="890" y="310" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#FFFFFF">adaptive to runs</text><text x="890" y="350" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#FFFFFF">often clear when data has order</text>
  <text x="80" y="600" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">The defense is about learning this choice reliably enough to reduce runtime regret.</text>
  <line x1="40" y1="666" x2="1240" y2="666" stroke="#E2E8F0" /><text x="1240" y="696" text-anchor="end" font-family="'Anthropic Sans', 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#64748B">12 / 22</text>
  <path d="M0 692 H1280 V720 H0 Z" fill="#8F1D3A" />
</svg>