    <path fill="#FFFFFF" stroke="#BA1D2C" stroke-width="2" d="M1025,292 H1163 A23,23 0 0 1 1186,315 V315 A23,23 0 0 1 1163,338 H1025 A23,23 0 0 1 1002,315 V315 A23,23 0 0 1 1025,292 Z" />
    <text x="1094" y="322" text-anchor="middle" font-family="'Anthropic Sans', Arial, sans-serif" font-size="18" font-weight="700" fill="#191919">Heapsort</text>
    <path fill="#F4511E" d="M1025,366 H1163 A23,23 0 0 1 1186,389 V389 A23,23 0 0 1 1163,412 H1025 A23,23 0 0 1 1002,389 V389 A23,23 0 0 1 1025,366 Z" />
    <text x="1094" y="396" text-anchor="middle" font-family="'Anthropic Sans', Arial, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">Timsort</text>
