  <line x1="278" y1="873" x2="320" y2="873" stroke="black" stroke-width="1.2"/>
  <polygon points="322,873 313,870 313,876" fill="black"/>
  <text x="300" y="868" text-anchor="middle" font-size="9">Flow</text>

