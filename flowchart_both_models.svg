  <!-- R5: F1 diamond -->
  <polygon points="750,358 870,395 750,432 630,395" fill="white" stroke="black" stroke-width="2"/>
  <text x="750" y="390" text-anchor="middle">Domain =</text>
  <text x="750" y="406" text-anchor="middle">F1 Telemetry?</text>

  <!-- YES → right: Channel Router -->
  <line x1="870" y1="395" x2="940" y2="395" stroke="black" stroke-width="1.5"/>
  <polygon points="943,395 933,391 933,399" fill="black"/>
  <text x="905" y="387" text-anchor="middle" font-size="10" font-style="italic">YES</text>
  <rect x="943" y="377" width="44" height="36" fill="white" stroke="black" stroke-width="2"/>
  <text x="965" y="391" text-anchor="middle" font-size="10" font-weight="bold">Channel</text>
  <text x="965" y="406" text-anchor="middle" font-size="10" font-weight="bold">Router</text>

  <!-- Channel Router → Channel-Specific Selector -->
  <line x1="965" y1="413" x2="965" y2="450" stroke="black" stroke-width="1.5"/>
  <polygon points="965,453 961,443 969,443" fill="black"/>
  <rect x="915" y="453" width="100" height="36" fill="white" stroke="black" stroke-width="2"/>
  <text x="965" y="471" text-anchor="middle" font-size="10" font-weight="bold">Channel-Specific</text>
  <text x="965" y="484" text-anchor="middle" font-size="10" font-weight="bold">Selector</text>

  <!-- NO → down: Domain-Specific -->
  <line x1="750" y1="432" x2="750" y2="460" stroke="black" stroke-width="1.5"/>
  <polygon points="750,463 746,453 754,453" fill="black"/>
  <text x="762" y="452" font-size="10" font-style="italic">NO</text>

  <!-- R6: Domain-Specific Model -->
  <rect x="650" y="463" width="200" height="36" fill="white" stroke="black" stroke-width="2"/>
  <text x="750" y="481" text-anchor="middle" font-weight="bold">Domain-Specific</text>
  <text x="750" y="494" text-anchor="middle" font-weight="bold">XGBoost Selector</text>

  <!-- Merge both paths → argmax -->
  <line x1="965" y1="489" x2="965" y2="540" stroke="black" stroke-width="1.5"/>
  <line x1="965" y1="540" x2="798" y2="540" stroke="black" stroke-width="1.5"/>
  <polygon points="795,540 805,536 805,544" fill="black"/>

  <line x1="750" y1="499" x2="750" y2="540" stroke="black" stroke-width="1.5"/>
  <polygon points="750,543 746,533 754,533" fill="black"/>

  <!-- R7: argmax diamond -->
  <polygon points="750,543 870,580 750,617 630,580" fill="white" stroke="black" stroke-width="2"/>
  <text x="750" y="575" text-anchor="middle">argmax</text>
  <text x="750" y="591" text-anchor="middle">probability</text>

  <!-- Left: Introsort -->
  <line x1="630" y1="580" x2="568" y2="580" stroke="black" stroke-width="1.5"/>
  <line x1="568" y1="580" x2="568" y2="645" stroke="black" stroke-width="1.5"/>
  <polygon points="568,648 564,638 572,638" fill="black"/>
  <text x="599" y="572" text-anchor="middle" font-size="10" font-style="italic">Introsort</text>

  <!-- Centre: Heapsort -->
  <line x1="750" y1="617" x2="750" y2="645" stroke="black" stroke-width="1.5"/>
  <polygon points="750,648 746,638 754,638" fill="black"/>
  <text x="772" y="637" font-size="10" font-style="italic">Heapsort</text>

  <!-- Right: Timsort -->
  <line x1="870" y1="580" x2="932" y2="580" stroke="black" stroke-width="1.5"/>
  <line x1="932" y1="580" x2="932" y2="645" stroke="black" stroke-width="1.5"/>
  <polygon points="932,648 928,638 936,638" fill="black"/>
  <text x="901" y="572" text-anchor="middle" font-size="10" font-style="italic">Timsort</text>

  <!-- R8a,b,c -->
  <rect x="524" y="648" width="88" height="34" fill="white" stroke="black" stroke-width="2"/>
  <text x="568" y="669" text-anchor="middle" font-weight="bold">Introsort</text>

  <rect x="706" y="648" width="88" height="34" fill="white" stroke="black" stroke-width="2"/>
  <text x="750" y="669" text-anchor="middle" font-weight="bold">Heapsort</text>

  <rect x="888" y="648" width="88" height="34" fill="white" stroke="black" stroke-width="2"/>
  <text x="932" y="669" text-anchor="middle" font-weight="bold">Timsort</text>

  <!-- Converge to R9 -->
  <line x1="568" y1="682" x2="568" y2="725" stroke="black" stroke-width="1.5"/>
  <line x1="568" y1="725" x2="724" y2="725" stroke="black" stroke-width="1.5"/>
  <polygon points="727,725 717,721 717,729" fill="black"/>

  <line x1="750" y1="682" x2="750" y2="725" stroke="black" stroke-width="1.5"/>
  <polygon points="750,728 746,718 754,718" fill="black"/>

  <line x1="932" y1="682" x2="932" y2="725" stroke="black" stroke-width="1.5"/>
  <line x1="932" y1="725" x2="776" y2="725" stroke="black" stroke-width="1.5"/>
  <polygon points="773,725 783,721 783,729" fill="black"/>

  <!-- R9: Execute -->
  <rect x="650" y="728" width="200" height="36" fill="white" stroke="black" stroke-width="2"/>
  <text x="750" y="751" text-anchor="middle" font-weight="bold">Execute Selected Algorithm</text>

  <!-- R9→R10 -->
  <line x1="750" y1="764" x2="750" y2="790" stroke="black" stroke-width="1.5"/>
  <polygon points="750,793 746,783 754,783" fill="black"/>

  <!-- R10: Output -->
  <rect x="650" y="793" width="200" height="36" rx="18" fill="white" stroke="black" stroke-width="2"/>
  <text x="750" y="816" text-anchor="middle" font-weight="bold">Sorted Array</text>


  <!-- LEGEND -->
  <rect x="30" y="858" width="940" height="28" rx="4" fill="white" stroke="black" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="44" y="865" width="68" height="16" rx="8" fill="white" stroke="black" stroke-width="1.2"/>
  <text x="78" y="877" text-anchor="middle" font-size="9">Start / End</text>
  <rect x="124" y="865" width="56" height="16" fill="white" stroke="black" stroke-width="1.2"/>
  <text x="152" y="877" text-anchor="middle" font-size="9">Process</text>
  <polygon points="222,873 238,865 254,873 238,881" fill="white" stroke="black" stroke-width="1.2"/>
