  <!-- NO → down -->
  <line x1="750" y1="199" x2="750" y2="225" stroke="black" stroke-width="1.5"/>
  <polygon points="750,228 746,218 754,218" fill="black"/>
  <text x="762" y="218" font-size="10" font-style="italic">NO</text>

  <!-- R3: Feature Extraction -->
  <rect x="650" y="228" width="200" height="36" fill="white" stroke="black" stroke-width="2"/>
  <text x="750" y="251" text-anchor="middle" font-weight="bold">Feature Extraction</text>

  <!-- R3→R4 -->
  <line x1="750" y1="264" x2="750" y2="290" stroke="black" stroke-width="1.5"/>
  <polygon points="750,293 746,283 754,283" fill="black"/>

  <!-- R4: Domain Classifier -->
  <rect x="650" y="293" width="200" height="36" fill="white" stroke="black" stroke-width="2"/>
