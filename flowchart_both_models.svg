<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="900" viewBox="0 0 1000 900" font-family="Arial, sans-serif" font-size="12">

  <rect width="1000" height="900" fill="white"/>

  <!-- PAGE TITLE -->
  <text x="500" y="30" text-anchor="middle" font-size="14" font-weight="bold">Sorting Algorithm Selector — Model Architectures</text>

  <!-- COLUMN HEADERS -->
  <text x="250" y="52" text-anchor="middle" font-size="12" font-weight="bold">(a) Global Model v5</text>
  <text x="750" y="52" text-anchor="middle" font-size="12" font-weight="bold">(b) Routed Specialised Model</text>

  <!-- vertical separator -->
  <line x1="500" y1="42" x2="500" y2="870" stroke="black" stroke-width="1" stroke-dasharray="6,4"/>


  <!-- ══════════════════════════════════════
       LEFT — GLOBAL MODEL V5
       ══════════════════════════════════════ -->

  <!-- L1: Input -->
  <rect x="150" y="62" width="200" height="36" rx="18" fill="white" stroke="black" stroke-width="2"/>
  <text x="250" y="85" text-anchor="middle" font-weight="bold">Input Array</text>

  <!-- L1→L2 -->
  <line x1="250" y1="98" x2="250" y2="122" stroke="black" stroke-width="1.5"/>
  <polygon points="250,125 246,115 254,115" fill="black"/>

  <!-- L2: Size threshold diamond -->
  <polygon points="250,125 370,162 250,199 130,162" fill="white" stroke="black" stroke-width="2"/>
  <text x="250" y="157" text-anchor="middle">n &lt; length</text>
  <text x="250" y="173" text-anchor="middle">threshold?</text>

  <!-- YES → right -->
  <line x1="370" y1="162" x2="430" y2="162" stroke="black" stroke-width="1.5"/>
  <polygon points="433,162 423,158 423,166" fill="black"/>
  <text x="400" y="154" text-anchor="middle" font-size="10" font-style="italic">YES</text>
  <rect x="433" y="144" width="52" height="36" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="459" y="167" text-anchor="middle" font-size="11">Timsort</text>
  <line x1="459" y1="180" x2="459" y2="205" stroke="black" stroke-width="1.5"/>
  <polygon points="459,208 455,198 463,198" fill="black"/>
  <rect x="419" y="208" width="80" height="30" rx="15" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="459" y="228" text-anchor="middle" font-size="11" font-weight="bold">Sorted Array</text>

  <!-- NO → down -->
  <line x1="250" y1="199" x2="250" y2="225" stroke="black" stroke-width="1.5"/>
  <polygon points="250,228 246,218 254,218" fill="black"/>
  <text x="262" y="218" font-size="10" font-style="italic">NO</text>

  <!-- L3: Feature Extraction -->
  <rect x="150" y="228" width="200" height="36" fill="white" stroke="black" stroke-width="2"/>
