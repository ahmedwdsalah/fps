  <line x1="130" y1="395" x2="68" y2="395" stroke="black" stroke-width="1.5"/>
  <line x1="68"  y1="395" x2="68"  y2="460" stroke="black" stroke-width="1.5"/>
  <polygon points="68,463 64,453 72,453" fill="black"/>
  <text x="99" y="387" text-anchor="middle" font-size="10" font-style="italic">Introsort</text>

  <!-- Centre: Heapsort -->
  <line x1="250" y1="432" x2="250" y2="460" stroke="black" stroke-width="1.5"/>
  <polygon points="250,463 246,453 254,453" fill="black"/>
  <text x="272" y="452" font-size="10" font-style="italic">Heapsort</text>

  <!-- Right: Timsort -->
  <line x1="370" y1="395" x2="432" y2="395" stroke="black" stroke-width="1.5"/>
  <line x1="432" y1="395" x2="432" y2="460" stroke="black" stroke-width="1.5"/>
  <polygon points="432,463 428,453 436,453" fill="black"/>
  <text x="401" y="387" text-anchor="middle" font-size="10" font-style="italic">Timsort</text>

  <!-- L6a -->
  <rect x="24"  y="463" width="88" height="34" fill="white" stroke="black" stroke-width="2"/>
  <text x="68"  y="484" text-anchor="middle" font-weight="bold">Introsort</text>

  <!-- L6b -->
  <rect x="206" y="463" width="88" height="34" fill="white" stroke="black" stroke-width="2"/>
  <text x="250" y="484" text-anchor="middle" font-weight="bold">Heapsort</text>

  <!-- L6c -->
  <rect x="388" y="463" width="88" height="34" fill="white" stroke="black" stroke-width="2"/>
  <text x="432" y="484" text-anchor="middle" font-weight="bold">Timsort</text>

  <!-- Converge to L7 -->
  <line x1="68"  y1="497" x2="68"  y2="540" stroke="black" stroke-width="1.5"/>
  <line x1="68"  y1="540" x2="224" y2="540" stroke="black" stroke-width="1.5"/>
  <polygon points="227,540 217,536 217,544" fill="black"/>

  <line x1="250" y1="497" x2="250" y2="540" stroke="black" stroke-width="1.5"/>
  <polygon points="250,543 246,533 254,533" fill="black"/>

  <line x1="432" y1="497" x2="432" y2="540" stroke="black" stroke-width="1.5"/>
  <line x1="432" y1="540" x2="276" y2="540" stroke="black" stroke-width="1.5"/>
  <polygon points="273,540 283,536 283,544" fill="black"/>

  <!-- L7: Execute -->
  <rect x="150" y="543" width="200" height="36" fill="white" stroke="black" stroke-width="2"/>
  <text x="250" y="566" text-anchor="middle" font-weight="bold">Execute Selected Algorithm</text>

  <!-- L7→L8 -->
  <line x1="250" y1="579" x2="250" y2="605" stroke="black" stroke-width="1.5"/>
  <polygon points="250,608 246,598 254,598" fill="black"/>

  <!-- L8: Output -->
  <rect x="150" y="608" width="200" height="36" rx="18" fill="white" stroke="black" stroke-width="2"/>
  <text x="250" y="631" text-anchor="middle" font-weight="bold">Sorted Array</text>


  <!-- ══════════════════════════════════════
       RIGHT — ROUTED SPECIALISED MODEL
       ══════════════════════════════════════ -->

  <!-- R1: Input -->
  <rect x="650" y="62" width="200" height="36" rx="18" fill="white" stroke="black" stroke-width="2"/>
  <text x="750" y="85" text-anchor="middle" font-weight="bold">Input Array</text>

  <!-- R1→R2 -->
  <line x1="750" y1="98" x2="750" y2="122" stroke="black" stroke-width="1.5"/>
  <polygon points="750,125 746,115 754,115" fill="black"/>

  <!-- R2: Size threshold diamond -->
  <polygon points="750,125 870,162 750,199 630,162" fill="white" stroke="black" stroke-width="2"/>
  <text x="750" y="157" text-anchor="middle">n &lt; length</text>
  <text x="750" y="173" text-anchor="middle">threshold?</text>

  <!-- YES → right -->
  <line x1="870" y1="162" x2="930" y2="162" stroke="black" stroke-width="1.5"/>
  <polygon points="933,162 923,158 923,166" fill="black"/>
  <text x="900" y="154" text-anchor="middle" font-size="10" font-style="italic">YES</text>
  <rect x="933" y="144" width="52" height="36" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="959" y="167" text-anchor="middle" font-size="11">Timsort</text>
  <line x1="959" y1="180" x2="959" y2="205" stroke="black" stroke-width="1.5"/>
  <polygon points="959,208 955,198 963,198" fill="black"/>
  <rect x="919" y="208" width="80" height="30" rx="15" fill="white" stroke="black" stroke-width="1.5"/>
